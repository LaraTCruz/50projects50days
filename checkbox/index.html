<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Checkbox</title>
</head>
<body>
  <h2>Como Funciona A Vida Adulta!</h2>
    <div class="toggle-container">
      <input type="checkbox" id="dormir" class="toggle">
      <label for="dormir" class="label">
        <div class="ball"></div>
      </label>
      <span>Dormir</span>
    </div>

    <div class="toggle-container">
      <input type="checkbox" id="trabalho" class="toggle">
      <label for="trabalho" class="label">
        <div class="ball"></div>
      </label>
      <span>Trabalhar</span>
    </div>

    <div class="toggle-container">
      <input type="checkbox" id="social" class="toggle">
      <label for="social" class="label">
        <div class="ball"></div>
      </label>
      <span>Ser Social</span>
    </div>

  <script src="main.js"></script>
</body>
</html>
