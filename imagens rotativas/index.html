<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Imagens Rotativas</title>
</head>
<body>
  
  <div class="carousel">
    <div class="image-container" id="imgs">
      <img src="https://images.unsplash.com/photo-1773983485631-16aa04616b89?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDM2fDZzTVZqVExTa2VRfHxlbnwwfHx8fHw%3D" alt="Primeira-Imagem">
      
      <img src="https://images.unsplash.com/photo-1774598051191-fb26ebedc054?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDh8aG1lbnZRaFVteE18fGVufDB8fHx8fA%3D%3D" alt="Segunda-Imagem">
      
      <img src="https://plus.unsplash.com/premium_photo-1733864822242-3cf656f3e18e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDUxfE04alZiTGJUUndzfHxlbnwwfHx8fHw%3D" alt="Terceira-Imagem">

      <img src="https://images.unsplash.com/photo-1773506615410-19807d5dd2c0?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDU3fHhIeFlUTUhMZ09jfHxlbnwwfHx8fHw%3D" alt="Quarta-Imagem">
    </div>

    <div class="buttons-container">
      <button id="left" class="btn">Voltar</button>
      <button id="right" class="btn">Próxima</button>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
